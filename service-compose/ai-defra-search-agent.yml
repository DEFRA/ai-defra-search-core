services:
  ai-defra-search-agent:
    build:
      context: ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-agent
      target: development
    ports:
      - 8086:8086
    links:
      - "mongodb:mongodb"
    depends_on:
      mongodb:
        condition: service_started
      localstack:
        condition: service_healthy
      ai-defra-search-knowledge:
        condition: service_healthy
      bedrock-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      start_period: 10s
      retries: 3
    env_file:
      - "../.env"
    entrypoint: []
    environment:
      PORT: ${PORT:-8086}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/}
      HOST: ${HOST:-0.0.0.0}
      LOCALSTACK_URL: ${LOCALSTACK_URL:-http://localstack:4566}
      LOG_CONFIG: logging-dev.json
      BEDROCK_ENDPOINT_URL: ${BEDROCK_ENDPOINT_URL:-http://bedrock-mock:8080}
    command: ["python", "-Xfrozen_modules=off", "-m", "debugpy", "--listen", "0.0.0.0:5678", "/home/nonroot/.venv/bin/ai-defra-search-agent"]
    volumes:
      - ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-agent/app:/home/nonroot/app
    develop:
      watch:
        - action: rebuild
          path: ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-agent/pyproject.toml
          target: /home/nonroot/pyproject.toml
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-defra-search"
      - "traefik.http.routers.agent.rule=Host(`agent.localhost`)"
      - "traefik.http.routers.agent.entrypoints=web"
      - "traefik.http.services.agent.loadbalancer.server.port=8086"
    networks:
      - ai-defra-search