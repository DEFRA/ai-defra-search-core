# Journey/E2E tests. Run against existing stack (starts selenium-chrome).
# bedrock-mock is in main compose; use BEDROCK_ENDPOINT_URL= to switch to real Bedrock.
#   docker compose --profile journey-tests run ai-defra-search-journey-tests
services:
  selenium-chrome:
    image: selenium/standalone-chrome:123.0
    profiles:
      - journey-tests
    depends_on:
      bedrock-mock:
        condition: service_healthy
    networks:
      - ai-defra-search

  ai-defra-search-journey-tests:
    build:
      context: ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-journey-tests
    profiles:
      - journey-tests
    depends_on:
      bedrock-mock:
        condition: service_healthy
      selenium-chrome:
        condition: service_started
    entrypoint: []
    command:
      - sh
      - -c
      - |
        until curl -sf http://bedrock-mock:8080/__admin/health; do echo "Waiting for WireMock..."; sleep 2; done
        npm run test:docker
        code=$$?
        cp -r allure-results /app/reports-output/ 2>/dev/null || true
        exit $$code
    environment:
      BASE_URL: http://ai-defra-search-frontend:3000
      WIREMOCK_URL: http://bedrock-mock:8080
    volumes:
      - ${COMPOSE_PROJECT_DIR:-..}/reports/journey-tests:/app/reports-output
    networks:
      - ai-defra-search
