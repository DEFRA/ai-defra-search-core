services:
  ai-defra-search-frontend:
    build:
      target: development
      context: ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-frontend
    ports:
      - '3000:3000'
    links:
      - 'redis:redis'
    depends_on:
      redis:
        condition: service_started
      ai-defra-search-knowledge:
        condition: service_healthy
      ai-defra-search-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      start_period: 10s
      retries: 3
    env_file:
      - "../.env"
    volumes:
      - ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-frontend/src/:/home/node/src
      - ${COMPOSE_PROJECT_DIR:-..}/services/ai-defra-search-frontend/package.json:/home/node/package.json
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      KNOWLEDGE_API_URL: http://ai-defra-search-knowledge:8085
      CDP_UPLOADER_URL: ${CDP_UPLOADER_URL:-http://cdp-uploader:7337}
      CDP_UPLOAD_CALLBACK_URL: ${CDP_UPLOAD_CALLBACK_URL:-http://ai-defra-search-frontend:3000/upload/callback}
      UPLOAD_BUCKET_NAME: ${UPLOAD_BUCKET_NAME:-my-bucket}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-defra-search"
      - "traefik.http.routers.frontend.rule=Host(`frontend.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - ai-defra-search
